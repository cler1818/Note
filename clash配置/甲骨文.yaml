# ==============================================
# Clash Verge 小白版配置 - 直接 IP + Hysteria2
# ==============================================

port: 7890
socks-port: 7891
redir-port: 7892
allow-lan: true
mode: Rule
log-level: info
external-controller: 0.0.0.0:9090
ipv6: false
experimental:
  ignore-resolve-fail: true

dns:
  enable: true
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  fallback:
    - 114.114.114.114
    - 223.6.6.6
  enhanced-mode: fake-ip

proxies:
  - name: Oracle-HY2-IP
    type: hysteria2
    server: 64.181.255.79
    port: 8443
    password: 123456789
    sni: ""                    # 空值，不用域名
    skip-cert-verify: true      # 跳过证书验证
    udp: true
    fast-open: true
    up: "1000 Mbps"
    down: "1000 Mbps"
    alpn:
      - h3
      - h3-29

proxy-groups:
  - name: Auto
    type: select
    proxies:
      - Oracle-HY2-IP

rules:
  - DOMAIN-SUFFIX,cn,DIRECT
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,weibo.com,DIRECT
  - DOMAIN-SUFFIX,163.com,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Auto
